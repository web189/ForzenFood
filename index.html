<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frozen Food 2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
</head>
<body>

<!-- NAVBAR -->
<header>
  <div class="logo">❄️ FrozenMart</div>
  <nav>
    <a href="#">Home</a>
    <a href="#produk">Produk</a>
    <a href="#tentang">Tentang</a>
    <a href="#kontak">Kontak</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Frozen Food Modern 2026</h1>
    <p>Makanan praktis, higienis & siap saji</p>
    <button onclick="scrollToProduk()">Lihat Produk</button>
  </div>
</section>

<!-- PRODUK -->
<section id="produk" class="produk">
  <h2>Produk Terlaris 🔥</h2>
  <div class="produk-list" id="produkList"></div>
</section>

<!-- TENTANG -->
<section id="tentang" class="tentang">
  <h2>Tentang Kami</h2>
  <p>
    FrozenMart menyediakan berbagai frozen food berkualitas tinggi,
    cocok untuk keluarga modern. Praktis, cepat, dan enak!
  </p>
</section>

<!-- CTA -->
<section class="cta">
  <h2>Pesan Sekarang</h2>
  <button onclick="orderWA()">Order via WhatsApp</button>
</section>

<!-- FOOTER -->
<footer id="kontak">
  <p>© 2026 FrozenMart</p>
</footer>

<script src="app.js"></script>
</body>
</html>
